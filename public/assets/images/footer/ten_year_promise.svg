<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="300" height="300" viewBox="0 0 300 300" xmlns:xlink="http://www.w3.org/1999/xlink">
  <defs>
    <!-- 三色渐变：红 → 橙 → 绿 -->
    <linearGradient id="progressGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e74c3c;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#f39c12;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#27ae60;stop-opacity:1" />
    </linearGradient>

    <!-- 阴影 -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.12"/>
    </filter>
  </defs>

  <!-- 背景：半透灰 -->
  <rect width="300" height="300" rx="12" fill="rgba(200, 200, 210, 0.45)" stroke="rgba(255, 255, 255, 0.6)" stroke-width="2" filter="url(#shadow)"/>

  <!-- 内边框 -->
  <rect x="6" y="6" width="288" height="288" rx="10" fill="none" stroke="rgba(255, 255, 255, 0.35)" stroke-width="1"/>

  <!-- 标题 -->
  <text x="150" y="38" text-anchor="middle" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="20" font-weight="bold" fill="#2c3e50">
    十年之约
  </text>

  <!-- 时间范围 -->
  <text x="150" y="58" text-anchor="middle" font-family="'Microsoft YaHei', monospace" font-size="11" fill="#5a6c7d">
    2026.06.14 — 2036.06.14
  </text>

  <!-- 圆形进度条 -->
  <g transform="translate(150, 148)">
    <!-- 背景圆环 -->
    <circle cx="0" cy="0" r="70" fill="none" stroke="rgba(255, 255, 255, 0.4)" stroke-width="12"/>

    <!-- 进度圆环 -->
    <circle id="progressCircle" cx="0" cy="0" r="70" fill="none" stroke="url(#progressGrad)" 
            stroke-width="12" stroke-linecap="round"
            stroke-dasharray="0 439.82" transform="rotate(-90)"/>

    <!-- 中心百分比 -->
    <text id="progressText" x="0" y="-4" text-anchor="middle" font-family="'Microsoft YaHei', monospace" font-size="18" font-weight="bold" fill="#2c3e50">
      0.00%
    </text>
    <text x="0" y="14" text-anchor="middle" font-family="'Microsoft YaHei', sans-serif" font-size="10" fill="#5a6c7d">
      已完成
    </text>
  </g>

  <!-- 底部统计 -->
  <g transform="translate(0, 238)">
    <!-- 已过去 -->
    <text x="75" y="0" text-anchor="middle" font-family="'Microsoft YaHei', sans-serif" font-size="10" fill="#5a6c7d">已过去</text>
    <text id="daysElapsed" x="75" y="24" text-anchor="middle" font-family="'Microsoft YaHei', monospace" font-size="20" font-weight="bold" fill="#c0392b">0</text>
    <text x="75" y="40" text-anchor="middle" font-family="'Microsoft YaHei', sans-serif" font-size="10" fill="#5a6c7d">天</text>

    <!-- 分隔 -->
    <line x1="150" y1="4" x2="150" y2="38" stroke="rgba(255, 255, 255, 0.4)" stroke-width="1"/>

    <!-- 剩余 -->
    <text x="225" y="0" text-anchor="middle" font-family="'Microsoft YaHei', sans-serif" font-size="10" fill="#5a6c7d">剩余</text>
    <text id="daysRemaining" x="225" y="24" text-anchor="middle" font-family="'Microsoft YaHei', monospace" font-size="20" font-weight="bold" fill="#27ae60">3653</text>
    <text x="225" y="40" text-anchor="middle" font-family="'Microsoft YaHei', sans-serif" font-size="10" fill="#5a6c7d">天</text>
  </g>

  <!-- 当前时间：上移避免重叠 -->
  <text id="currentTime" x="150" y="288" text-anchor="middle" font-family="'Microsoft YaHei', monospace" font-size="9" fill="#7f8c8d">
    加载中...
  </text>

  <script type="text/javascript">
    <![CDATA[
    function updateProgress() {
      var startDate = new Date("2026-06-14T00:00:00+08:00");
      var endDate = new Date("2036-06-14T00:00:00+08:00");
      var now = new Date();

      var totalMs = endDate - startDate;
      var elapsedMs = now - startDate;
      var remainingMs = endDate - now;

      var progress = Math.max(0, Math.min(100, (elapsedMs / totalMs) * 100));
      var daysElapsed = Math.floor(elapsedMs / (1000 * 60 * 60 * 24));
      var daysRemaining = Math.max(0, Math.floor(remainingMs / (1000 * 60 * 60 * 24)));

      // 圆周长 = 2 * PI * 70 ≈ 439.82
      var circumference = 2 * Math.PI * 70;
      var dashOffset = circumference * (progress / 100);

      document.getElementById("progressCircle").setAttribute("stroke-dasharray", dashOffset + " " + circumference);
      document.getElementById("progressText").textContent = progress.toFixed(4) + "%";
      document.getElementById("daysElapsed").textContent = daysElapsed;
      document.getElementById("daysRemaining").textContent = daysRemaining;

      var timeStr = now.getFullYear() + "-" + 
        String(now.getMonth() + 1).padStart(2, "0") + "-" + 
        String(now.getDate()).padStart(2, "0") + " " + 
        String(now.getHours()).padStart(2, "0") + ":" + 
        String(now.getMinutes()).padStart(2, "0") + ":" + 
        String(now.getSeconds()).padStart(2, "0");
      document.getElementById("currentTime").textContent = timeStr;
    }

    updateProgress();
    setInterval(updateProgress, 1000);
    ]]>
  </script>
</svg>